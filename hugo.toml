# ===== Basic =====
baseURL = "https://ikonglong.github.io/"
theme = "LoveIt"
title = "Konglong's Blog"

# default content language ["en", "zh-cn", ...]
defaultContentLanguage = "en"
locale = "en-us"
languageName = "English"
# include Chinese/Japanese/Korean text (helps with word counting & summaries)
hasCJKLanguage = true

enableRobotsTXT = true
# disabled because GitHub Actions checks out without full git history by default;
# enable it later if you set fetch-depth: 0 in the workflow.
enableGitInfo = false
enableEmoji = true

# ignore some non-fatal build errors
ignoreErrors = ["error-remote-getjson", "error-missing-instagram-accesstoken"]

[pagination]
  pagerSize = 10
  path = "page"

# ===== Menu =====
[menu]
  [[menu.main]]
    weight = 1
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
  [[menu.main]]
    weight = 2
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
  [[menu.main]]
    weight = 3
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
  [[menu.main]]
    weight = 4
    identifier = "about"
    name = "About"
    url = "/about/"
  [[menu.main]]
    weight = 5
    identifier = "github"
    pre = "<i class='fab fa-github' aria-hidden='true'></i>"
    name = ""
    url = "https://github.com/ikonglong"
    title = "GitHub"

[params]
  # site default theme ["auto", "light", "dark"]
  defaultTheme = "auto"
  gitRepo = "https://github.com/ikonglong/ikonglong.github.io"
  dateFormat = "2006-01-02"
  title = "Konglong's Blog"
  description = "Konglong's personal blog"
  images = ["/logo.png"]

  [params.author]
    name = "konglong"
    email = ""
    link = ""

  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"
    [params.header.title]
      logo = ""
      name = "Konglong's Blog"
      pre = "<i class='far fa-kiss-wink-heart' aria-hidden='true'></i>"
      typeit = false

  [params.footer]
    enable = true
    hugo = true
    copyright = true
    author = true
    since = 2026
    license = '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  [params.section]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  [params.list]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  # local search, no external service needed
  [params.search]
    enable = true
    type = "fuse"
    contentLength = 4000
    placeholder = ""
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
    absoluteURL = false
    [params.search.fuse]
      isCaseSensitive = false
      minMatchCharLength = 2
      findAllMatches = false
      location = 0
      threshold = 0.3
      distance = 100
      ignoreLocation = false

  [params.home]
    rss = 10
    [params.home.profile]
      enable = true
      gravatarEmail = ""
      avatarURL = "/images/avatar.png"
      title = ""
      subtitle = "Welcome to my blog"
      typeit = true
      social = true
      disclaimer = ""
    [params.home.posts]
      enable = true
      paginate = 6

  [params.social]
    GitHub = "ikonglong"
    Email = ""
    RSS = true

  [params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    twemoji = false
    lightgallery = false
    ruby = true
    fraction = true
    fontawesome = true
    linkToMarkdown = true
    rssFullText = false
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
    [params.page.code]
      copy = true
      maxShownLines = 50
    [params.page.math]
      enable = false
    [params.page.share]
      enable = true
    [params.page.comment]
      enable = false

# ===== Markup =====
[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[permalinks]
  posts = ":contentbasename"

# ===== Outputs (required by LoveIt for search/RSS) =====
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML", "MarkDown"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["md"]

[outputFormats.MarkDown]
  mediaType = "text/plain"
  isPlainText = true
  isHTML = false
